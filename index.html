<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Post messages</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>Subject</h1>
      <button id="theme-toggle" class="secondary-btn">🌙 Dark Mode</button>
    </div>
    
    <div id="messages-list" class="list">
      <!-- Messages will be injected here -->
    </div>

    <div class="input-group">
      <input type="text" id="username" placeholder="Your username..." class="input-field">
      <textarea id="message-text" placeholder="Write your message..." class="input-field"></textarea>
      <div class="button-group">
        <button id="post-btn">Post</button>
        <button id="refresh-btn" class="secondary-btn">Update List</button>
      </div>
    </div>
  </div>
</body>
<script src="script.js"></script>

</html>
