<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Post messages</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Subject</h1>
      <button id="theme-toggle" class="secondary-btn theme-btn" title="Toggle theme">🌙 Dark</button>
    </div>
    <ul class="list" id="message-list">
      <li>Toto</li>
      <li>Tata</li>
      <li>Titi</li>
      <li>Lolo</li>
      <li>Lili</li>
    </ul>
    <div class="input-group">
      <input type="text" class="input-field" id="pseudo-input" placeholder="Your username..." maxlength="30" />
      <textarea class="input-field" id="message-input" placeholder="Write your message..."></textarea>
      <div class="button-group">
        <button id="post-btn">Post</button>
        <button id="update-btn" class="secondary-btn">🔄 Update</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
